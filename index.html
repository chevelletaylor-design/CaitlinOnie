<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Caitlin Onie Photography — Portraits, products, landscapes, weddings & nature. Capturing the natural beauty of the world through portraiture and editorial vision." />
<title>Caitlin Onie Photography — Portraits, Weddings & Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Italianno&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="page-home">

<!-- Floating pill nav — no logo on home page -->
<nav class="site-nav">
  <button class="mobile-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="portraits.html">Portraits</a>
    <a href="products.html">Products</a>
    <a href="landscapes.html">Landscapes</a>
    <a href="weddings.html">Weddings</a>
    <a href="nature.html">Nature</a>
    <a href="about.html">About</a>
    <a href="inquire.html">Inquire</a>
  </div>
</nav>

<!-- Hero with centered LOGO image (uploaded via admin) -->
<section class="hero-home">
  <div class="hero-carousel"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">
      <span class="line"></span>
      <span class="est">EST.</span>
      <span class="year">2024</span>
      <span class="line"></span>
    </div>
    <img class="hero-logo" src="" alt="Caitlin Onie Photography">
    <p class="hero-tagline">Photography</p>
    <a class="hero-cta" href="inquire.html">Book a session</a>
  </div>
  <div class="hero-bottom-meta"></div>
  <div class="hero-dots"></div>
</section>

<!-- Categories grid: 3 on top, 2 on bottom -->
<section class="categories">
  <div class="container">
    <div class="categories-header reveal">
      <h2 class="display categories-title"></h2>
      <p class="categories-blurb"></p>
    </div>
    <div class="categories-grid reveal-stagger"></div>
  </div>
</section>

<!-- Expanded About section (replaces the smaller teaser) -->
<section class="about-home">
  <div class="about-home-grid">
    <div class="about-home-images reveal">
      <div class="about-home-img-main"></div>
      <div class="about-home-img-accent"></div>
    </div>
    <div class="about-home-content reveal">
      <span class="label">About</span>
      <span class="about-home-script"></span>
      <h2 class="display about-home-title"></h2>
      <div class="about-home-body"></div>
      <div class="about-home-stats"></div>
      <a class="about-home-link" href="about.html">
        Read my full story
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </a>
    </div>
  </div>
</section>

<!-- Social -->
<section class="social">
  <div class="container">
    <h2 class="display social-title reveal"></h2>
    <p class="social-handle reveal"></p>
    <div class="social-grid reveal-stagger"></div>
  </div>
</section>

<footer class="site-footer"></footer>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
<script src="scripts.js"></script>
</body>
</html>
