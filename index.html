<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Caitlin Onie Photography — Portraits, products, landscapes, weddings & nature. Capturing the natural beauty of the world through portraiture and editorial vision." />
<title>Caitlin Onie Photography — Portraits, Weddings & Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=Italianno&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="page-home">

<nav class="site-nav">
  <a href="index.html" class="nav-logo" aria-label="Caitlin Onie Photography">Caitlin Onie</a>
  <button class="mobile-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="portraits.html">Portraits</a>
    <a href="products.html">Products</a>
    <a href="landscapes.html">Landscapes</a>
    <a href="weddings.html">Weddings</a>
    <a href="nature.html">Nature</a>
    <a href="about.html">About</a>
    <a href="inquire.html">Inquire</a>
  </div>
</nav>

<!-- Hero with carousel background -->
<section class="hero-home">
  <div class="hero-carousel"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">
      <span class="line"></span>
      <span class="est">EST.</span>
      <span class="hero-logo-flank">Caitlin Onie</span>
      <span class="year">2024</span>
      <span class="line"></span>
    </div>
    <div class="hero-logo-stack">
      <span class="caitlin">CAITLIN</span>
      <span class="onie">Onie</span>
    </div>
    <p class="hero-tagline">Photography</p>
    <a class="hero-cta" href="inquire.html">Book a session</a>
  </div>
  <div class="hero-bottom-meta"></div>
  <div class="hero-dots"></div>
</section>

<!-- Intro / mission quote -->
<section class="intro">
  <div class="container">
    <p class="intro-quote reveal"></p>
    <p class="intro-byline reveal">— Caitlin Onie</p>
  </div>
</section>

<!-- Categories grid -->
<section class="categories">
  <div class="container">
    <div class="categories-header reveal">
      <h2 class="display categories-title"></h2>
      <p class="categories-blurb"></p>
    </div>
    <div class="categories-grid reveal-stagger"></div>
  </div>
</section>

<!-- Travel marquee -->
<div class="travel-marquee">
  <div class="travel-marquee-track"></div>
</div>

<!-- About teaser -->
<section class="about-teaser">
  <div class="about-teaser-grid">
    <div class="about-teaser-img reveal"></div>
    <div class="about-teaser-content reveal">
      <span class="label">About</span>
      <h2 class="display about-teaser-title"></h2>
      <p class="about-teaser-body"></p>
      <a class="about-teaser-link" href="about.html">
        Learn more about me
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </a>
    </div>
  </div>
</section>

<!-- Social -->
<section class="social">
  <div class="container">
    <h2 class="display social-title reveal"></h2>
    <p class="social-handle reveal"></p>
    <div class="social-grid reveal-stagger"></div>
  </div>
</section>

<footer class="site-footer"></footer>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
<script src="scripts.js"></script>
</body>
</html>
