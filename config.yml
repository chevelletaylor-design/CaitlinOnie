backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

publish_mode: editorial_workflow

collections:
  - name: "content"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:

      - name: "site"
        label: "🌿  Edit Site Content"
        file: "config.json"
        fields:

          - label: "Brand & Logo"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Short name (alt text + SEO)", name: "shortName", widget: "string" }
              - { label: "Full name (SEO)", name: "fullName", widget: "string" }
              - { label: "Logo (used everywhere — hero, nav, footer)", name: "logo", widget: "image", hint: "SVG or PNG with transparent background recommended. The footer auto-tints it cream-colored." }
              - { label: "Footer tagline", name: "footerTagline", widget: "text" }

          - label: "Contact info"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram handle", name: "instagramHandle", widget: "string" }
              - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
              - { label: "Hours", name: "hours", widget: "string" }
              - label: "Locations served"
                name: "locations"
                widget: "list"
                field: { label: "Location", name: "location", widget: "string" }

          - label: "Hero (home page)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Year founded", name: "year", widget: "string", required: false }
              - { label: "Tagline (above headline)", name: "tagline", widget: "string" }
              - { label: "Headline (use <em>word</em> for italic mandarin)", name: "headline", widget: "string" }
              - { label: "CTA label", name: "ctaLabel", widget: "string" }
              - { label: "CTA link", name: "ctaHref", widget: "string" }
              - label: "Carousel images (recommended: 6)"
                name: "carouselImages"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }

          - label: "Categories section header (home page)"
            name: "categoriesSection"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title (use <em>word</em>)", name: "title", widget: "string" }
              - { label: "Blurb", name: "blurb", widget: "text" }

          - label: "Categories grid (home page tiles — 5: 3 top, 2 bottom)"
            name: "categories"
            widget: "list"
            collapsed: true
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Cover image", name: "coverImage", widget: "image" }
              - { label: "Page link (e.g. portraits.html)", name: "href", widget: "string" }

          - label: "About section (home page)"
            name: "aboutHome"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Main image (large)", name: "imageMain", widget: "image" }
              - { label: "Accent image (smaller, overlapping)", name: "imageAccent", widget: "image" }
              - { label: "Script word above heading", name: "script", widget: "string", default: "Hello," }
              - { label: "Title (use <em>word</em>)", name: "title", widget: "string" }
              - label: "Body paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "p", widget: "text" }
              - label: "Stats (3 recommended)"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number (e.g. '4+', '100s')", name: "number", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "Social section (home page)"
            name: "social"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title (use <em>word</em>)", name: "title", widget: "string" }
              - { label: "Handle text", name: "handle", widget: "string" }
              - { label: "Profile URL", name: "profileUrl", widget: "string" }
              - label: "Posts (5 recommended)"
                name: "posts"
                widget: "list"
                fields:
                  - { label: "Thumbnail image", name: "thumbnail", widget: "image" }
                  - { label: "Post URL", name: "url", widget: "string" }

          - label: "Category pages content"
            name: "categoryPages"
            widget: "object"
            collapsed: true
            fields:

              - label: "📸  Portraits"
                name: "portraits"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Eyebrow label", name: "eyebrow", widget: "string" }
                  - { label: "Hero image (in the framed photo)", name: "heroImage", widget: "image" }
                  - { label: "Hero title (use <em>word</em>)", name: "heroTitle", widget: "string" }
                  - label: "Hero meta lines (3 recommended)"
                    name: "heroMeta"
                    widget: "list"
                    field: { label: "Line", name: "line", widget: "string" }
                  - { label: "Intro paragraph", name: "intro", widget: "text" }
                  - { label: "Quote background photo (muted, behind intro)", name: "quoteBg", widget: "image", required: false, hint: "A photo from this category that gets faded into the background behind the intro quote." }
                  - label: "Gallery (add as many photos as you want)"
                    name: "gallery"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }
                      - { label: "Caption (optional)", name: "caption", widget: "string", required: false }
                      - { label: "Featured? (larger placement)", name: "featured", widget: "boolean", default: false, required: false }
                  - label: "Up Next teaser"
                    name: "next"
                    widget: "object"
                    fields:
                      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                      - { label: "Title (use <em>word</em>)", name: "title", widget: "string" }
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Link", name: "href", widget: "string" }

              - label: "🛍️  Products"
                name: "products"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Eyebrow label", name: "eyebrow", widget: "string" }
                  - { label: "Hero image", name: "heroImage", widget: "image" }
                  - { label: "Hero title", name: "heroTitle", widget: "string" }
                  - label: "Hero meta lines"
                    name: "heroMeta"
                    widget: "list"
                    field: { label: "Line", name: "line", widget: "string" }
                  - { label: "Intro paragraph", name: "intro", widget: "text" }
                  - { label: "Quote background photo (muted, behind intro)", name: "quoteBg", widget: "image", required: false, hint: "A photo from this category that gets faded into the background behind the intro quote." }
                  - label: "Gallery"
                    name: "gallery"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }
                      - { label: "Caption", name: "caption", widget: "string", required: false }
                      - { label: "Featured?", name: "featured", widget: "boolean", default: false, required: false }
                  - { label: "Pricing section title", name: "pricingTitle", widget: "string" }
                  - { label: "Pricing section blurb", name: "pricingBlurb", widget: "text" }
                  - label: "Pricing tiers"
                    name: "pricing"
                    widget: "list"
                    fields:
                      - { label: "Tier label (e.g. Most popular)", name: "tier", widget: "string" }
                      - { label: "Package name", name: "name", widget: "string" }
                      - { label: "Price (number only, no $)", name: "price", widget: "string" }
                      - { label: "Button label", name: "ctaLabel", widget: "string", default: "Inquire" }
                      - label: "Features"
                        name: "features"
                        widget: "list"
                        field: { label: "Feature", name: "feature", widget: "string" }
                  - label: "Up Next teaser"
                    name: "next"
                    widget: "object"
                    fields:
                      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Link", name: "href", widget: "string" }

              - label: "🏞️  Landscapes"
                name: "landscapes"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Eyebrow label", name: "eyebrow", widget: "string" }
                  - { label: "Hero image", name: "heroImage", widget: "image" }
                  - { label: "Hero title", name: "heroTitle", widget: "string" }
                  - label: "Hero meta lines"
                    name: "heroMeta"
                    widget: "list"
                    field: { label: "Line", name: "line", widget: "string" }
                  - { label: "Intro paragraph", name: "intro", widget: "text" }
                  - { label: "Quote background photo (muted, behind intro)", name: "quoteBg", widget: "image", required: false, hint: "A photo from this category that gets faded into the background behind the intro quote." }
                  - label: "Gallery"
                    name: "gallery"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }
                      - { label: "Caption", name: "caption", widget: "string", required: false }
                      - { label: "Featured?", name: "featured", widget: "boolean", default: false, required: false }
                  - label: "Up Next teaser"
                    name: "next"
                    widget: "object"
                    fields:
                      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Link", name: "href", widget: "string" }

              - label: "💍  Weddings"
                name: "weddings"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Eyebrow label", name: "eyebrow", widget: "string" }
                  - { label: "Hero image", name: "heroImage", widget: "image" }
                  - { label: "Hero title", name: "heroTitle", widget: "string" }
                  - label: "Hero meta lines"
                    name: "heroMeta"
                    widget: "list"
                    field: { label: "Line", name: "line", widget: "string" }
                  - { label: "Intro paragraph", name: "intro", widget: "text" }
                  - { label: "Quote background photo (muted, behind intro)", name: "quoteBg", widget: "image", required: false, hint: "A photo from this category that gets faded into the background behind the intro quote." }
                  - label: "Gallery"
                    name: "gallery"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }
                      - { label: "Caption", name: "caption", widget: "string", required: false }
                      - { label: "Featured?", name: "featured", widget: "boolean", default: false, required: false }
                  - label: "Up Next teaser"
                    name: "next"
                    widget: "object"
                    fields:
                      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Link", name: "href", widget: "string" }

              - label: "🌸  Nature"
                name: "nature"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Eyebrow label", name: "eyebrow", widget: "string" }
                  - { label: "Hero image", name: "heroImage", widget: "image" }
                  - { label: "Hero title", name: "heroTitle", widget: "string" }
                  - label: "Hero meta lines"
                    name: "heroMeta"
                    widget: "list"
                    field: { label: "Line", name: "line", widget: "string" }
                  - { label: "Intro paragraph", name: "intro", widget: "text" }
                  - { label: "Quote background photo (muted, behind intro)", name: "quoteBg", widget: "image", required: false, hint: "A photo from this category that gets faded into the background behind the intro quote." }
                  - label: "Gallery"
                    name: "gallery"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }
                      - { label: "Caption", name: "caption", widget: "string", required: false }
                      - { label: "Featured?", name: "featured", widget: "boolean", default: false, required: false }
                  - label: "Up Next teaser"
                    name: "next"
                    widget: "object"
                    fields:
                      - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Link", name: "href", widget: "string" }

          - label: "👤  About page"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Hero image (Caitlin's main photo)", name: "heroImage", widget: "image" }
              - { label: "Hero script word", name: "heroScript", widget: "string", default: "Hello," }
              - { label: "Hero title (use <em>word</em>)", name: "heroTitle", widget: "string" }
              - label: "Intro paragraphs"
                name: "intro"
                widget: "list"
                field: { label: "Paragraph", name: "p", widget: "text" }
              - label: "Story paragraphs"
                name: "story"
                widget: "list"
                field: { label: "Paragraph", name: "p", widget: "text" }
              - { label: "Story background photo (muted, behind story quote)", name: "quoteBg", widget: "image", required: false, hint: "A favorite photo that gets faded into the background behind your story." }
              - label: "Travel images (4 recommended)"
                name: "travelImages"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
              - label: "Fun facts"
                name: "facts"
                widget: "list"
                fields:
                  - { label: "Fact title", name: "title", widget: "string" }
                  - { label: "Fact value", name: "value", widget: "string", hint: "For multi-item lists, edit config.json directly via GitHub." }

          - label: "✉️  Inquire page"
            name: "inquire"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title (use <em>word</em>)", name: "title", widget: "string" }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - { label: "Formspree action URL", name: "formAction", widget: "string" }
