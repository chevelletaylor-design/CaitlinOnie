  <a href="inquire.html" class="active">Inquire</a>
</div>

<section class="inquire">
  <div class="inquire-grid">
    <div class="inquire-info reveal">
      <span class="label">Get in touch</span>
      <h1></h1>
      <p class="blurb">Tell me about your project and I'll be in touch within 1–2 business days.</p>
      <div class="inquire-meta"></div>
    </div>

    <div class="inquire-form reveal">
      <form action="https://formspree.io/f/your-id-here" method="POST">
        <div class="inquire-form-row">
          <div class="inquire-form-field">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="inquire-form-field">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
        </div>
        <div class="inquire-form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="inquire-form-field">
          <label for="serviceType">Service of interest</label>
          <select id="serviceType" name="serviceType">
            <option value="">Select one…</option>
            <option value="Portraits">Portraits</option>
            <option value="Products">Products</option>
            <option value="Landscapes">Landscapes</option>
            <option value="Weddings">Weddings</option>
            <option value="Nature">Nature</option>
            <option value="Other">Other / not sure yet</option>
          </select>
        </div>
        <div class="inquire-form-field">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        <div class="inquire-form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="inquire-form-submit">Send inquiry</button>
      </form>
    </div>
  </div>
</section>

<footer class="site-footer"></footer>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
<script src="scripts.js"></script>
</body>
</html>
